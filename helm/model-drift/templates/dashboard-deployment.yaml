apiVersion: apps/v1
kind: Deployment
metadata:
  name: drift-dashboard
  namespace: {{ .Values.namespace }}

spec:
  replicas: {{ .Values.dashboard.replicaCount }}

  selector:
    matchLabels:
      app: drift-dashboard

  template:
    metadata:
      labels:
        app: drift-dashboard

    spec:
      containers:
        - name: dashboard
          image: "{{ .Values.dashboard.image.repository }}:{{ .Values.dashboard.image.tag }}"
          imagePullPolicy: {{ .Values.dashboard.image.pullPolicy }}

          ports:
            - containerPort: {{ .Values.dashboard.service.port }}

          envFrom:
            - configMapRef:
                name: drift-detective-config

          env:
            - name: API_HOST
              value: "drift-api-service"

            - name: API_PORT
              value: "8000"

            - name: STREAMLIT_PORT
              value: "8501"