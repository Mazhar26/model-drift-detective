namespace: model-drift

api:
  replicaCount: 1

  image:
    repository: zami0/model-drift-api
    tag: latest
    pullPolicy: Always

  service:
    type: ClusterIP
    port: 8000

dashboard:
  replicaCount: 1

  image:
    repository: zami0/model-drift-dashboard
    tag: latest
    pullPolicy: Always

  service:
    type: NodePort
    port: 8501
    nodePort: 30085

config:
  DEFAULT_THRESHOLD: "0.1"
  P_VALUE_THRESHOLD: "0.05"
  SEVERITY_HIGH_THRESHOLD: "0.3"
  SEVERITY_MEDIUM_THRESHOLD: "0.1"
  LOG_LEVEL: "INFO"
  MODEL_N_ESTIMATORS: "100"
  MODEL_RANDOM_STATE: "42"
  ALERTS_ENABLED: "false"