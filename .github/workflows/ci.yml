# ─────────────────────────────────────────────
# GitHub Actions CI/CD — Model Drift Detective
# ─────────────────────────────────────────────
name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  # ── Job 1: Run Tests ──────────────────────────
  test:
    name: Test Suite
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Set up environment
        run: cp .env.example .env

      - name: Run pytest unit tests
        run: pytest tests/ -v --tb=short

      - name: Run smoke tests (module-level)
        run: python smoke_test.py

      - name: Start FastAPI server
        run: |
          nohup python -m uvicorn api.main:app --host 0.0.0.0 --port 8000 &
          echo "Waiting for API to start..."
          sleep 10

      - name: Verify API is running
        run: |
          curl -f http://localhost:8000/ || exit 1
          curl -f http://localhost:8000/api/v1/summary || exit 1

      - name: Kill server
        if: always()
        run: |
          pkill -f "uvicorn api.main:app" || true

  # ── Job 2: Lint ───────────────────────────────
  lint:
    name: Code Linting
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install flake8
        run: |
          python -m pip install --upgrade pip
          pip install flake8

      - name: Run flake8 on src/
        run: flake8 src/ --max-line-length=100 --statistics

      - name: Run flake8 on api/
        run: flake8 api/ --max-line-length=100 --statistics
