# ─────────────────────────────────────────────
# GitHub Actions CI/CD — Model Drift Detective
# ─────────────────────────────────────────────
name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  # ── Job 1: Run Tests ──────────────────────────
  test:
    name: Test Suite
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Set up environment
        run: cp .env.example .env

      - name: Run pytest unit tests
        run: pytest tests/ -v --tb=short

      - name: Run smoke tests (module-level)
        run: python smoke_test.py

      - name: Start FastAPI server
        run: |
          nohup python -m uvicorn api.main:app --host 0.0.0.0 --port 8000 &
          echo "Waiting for API to start..."
          sleep 10

      - name: Verify API is running
        run: |
          curl -f http://localhost:8000/ || exit 1
          curl -f http://localhost:8000/api/v1/summary || exit 1

      - name: Kill server
        if: always()
        run: |
          pkill -f "uvicorn api.main:app" || true

  # ── Job 2: Lint ───────────────────────────────
  lint:
    name: Code Linting
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: 'pip'

      - name: Install linters and formatters
        run: |
          python -m pip install --upgrade pip
          pip install black isort flake8

      - name: Run black check
        run: black --check src/ api/ --line-length=100

      - name: Run isort check
        run: isort --check-only --profile black --line-length=100 src/ api/

      - name: Run flake8 on src/
        run: flake8 src/ --max-line-length=100 --statistics

      - name: Run flake8 on api/
        run: flake8 api/ --max-line-length=100 --statistics
  # ── Job 3: Terraform Validation ─────────────────
  terraform:
    name: Terraform Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Format Check
        working-directory: terraform
        run: terraform fmt -check

      - name: Terraform Init
        working-directory: terraform
        run: terraform init -backend=false

      - name: Terraform Validate
        working-directory: terraform
        run: terraform validate

  # ── Job 4: Docker Build Validation ─────────────
  docker:
    name: Docker Build & Push
    needs:
      - test
      - lint
      - terraform

    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build API Image
        run: |
          docker build \
            -t zami0/model-drift-api:latest \
            -t zami0/model-drift-api:${{ github.sha }} .

      - name: Build Dashboard Image
        run: |
          docker build \
            -f Dockerfile.streamlit \
            -t zami0/model-drift-dashboard:latest \
            -t zami0/model-drift-dashboard:${{ github.sha }} .

      - name: Push API Image
        run: |
          docker push zami0/model-drift-api:latest
          docker push zami0/model-drift-api:${{ github.sha }}

      - name: Push Dashboard Image
        run: |
          docker push zami0/model-drift-dashboard:latest
          docker push zami0/model-drift-dashboard:${{ github.sha }}